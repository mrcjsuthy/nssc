<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="NSSC // North Shore Social Club. A private order. Entry by worthiness only." />
    <meta name="referrer" content="no-referrer" />

    <title>NSSC // North Shore Social Club</title>

    <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&family=Noto+Sans+Egyptian+Hieroglyphs&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <canvas id="matrix" aria-hidden="true"></canvas>

    <div class="vignette" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="numerology" id="numerology" aria-hidden="true"></div>
    <div class="glyphs" id="glyphs" aria-hidden="true"></div>

    <header class="hud" aria-hidden="true">
      <div class="hud-left">
        <span class="dot"></span>
        <span class="hud-text" id="hud-status">SECURE LINK ESTABLISHED</span>
      </div>
      <div class="hud-center">
        <img class="hud-mark" src="assets/img/logo.svg" width="400" height="500" alt="" decoding="async" />
        <span>NSSC // NORTH SHORE SOCIAL CLUB</span>
      </div>
      <div class="hud-right">
        <span class="hud-text" id="hud-coord">36.7949°S · 174.7480°E</span>
      </div>
    </header>

    <main id="stage" class="stage" aria-live="polite"></main>

    <footer class="hud-foot" aria-hidden="true">
      <span id="hud-uptime">UPTIME 00:00:00</span>
      <span class="sep">·</span>
      <span id="hud-build">BUILD 1873.MMXXVI</span>
      <span class="sep">·</span>
      <span id="hud-seed">SEED ████</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/effects.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/screens.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
